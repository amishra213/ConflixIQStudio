name: Build Docker & Windows

on:
  push:
    branches:
      - main
      - master
      - copilot/**
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.package-version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build web application
        run: npm run build

      - name: Build Windows executable
        run: npm run sea:build:windows
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Find and prepare artifacts
        id: artifacts
        shell: powershell
        run: |
          $seaBuildDirs = Get-ChildItem -Path "dist" -Directory -Filter "sea-build-*" | Sort-Object Name -Descending
          if ($seaBuildDirs.Count -eq 0) { Write-Host "No sea-build directory found"; exit 1 }
          $latestDir = $seaBuildDirs[0].FullName
          Write-Host "Found build directory: $latestDir"
          $exeFile = Get-ChildItem -Path $latestDir -Filter "*.exe" | Select-Object -First 1
          $zipFile = Get-ChildItem -Path $latestDir -Filter "*.zip" | Select-Object -First 1
          if ($exeFile) { Write-Host "Found EXE: $($exeFile.Name)"; "exe_path=$($exeFile.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append }
          if ($zipFile) { Write-Host "Found ZIP: $($zipFile.Name)"; "zip_path=$($zipFile.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append }
          "build_dir=$latestDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            ${{ steps.artifacts.outputs.exe_path }}
            ${{ steps.artifacts.outputs.zip_path }}
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release (on tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.artifacts.outputs.exe_path }}
            ${{ steps.artifacts.outputs.zip_path }}
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  export-tar:
    name: Export Docker Image as TAR
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          outputs: type=docker,dest=/tmp/conflixiq-studio-${{ steps.package-version.outputs.version }}-amd64.tar
          platforms: linux/amd64

      - name: Create version tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${{ steps.package-version.outputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload TAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.version.outputs.version }}-amd64
          path: /tmp/conflixiq-studio-${{ steps.package-version.outputs.version }}-amd64.tar
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release with Docker TAR (on tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: /tmp/conflixiq-studio-${{ steps.package-version.outputs.version }}-amd64.tar
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
