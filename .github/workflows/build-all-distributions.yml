name: Build All Distributions

on:
  push:
    branches:
      - main
      - master
      - copilot/**
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build-all:
    name: Build All Distribution Packages
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint check
        run: npm run lint

      - name: Build all distributions
        run: npm run dist:build-all
        env:
          TEMP: ${{ runner.temp }}\conductor-build-temp
          TMP: ${{ runner.temp }}\conductor-build-temp
          ELECTRON_CACHE: ${{ runner.temp }}\conductor-build-temp\electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}\conductor-build-temp\electron-builder-cache
          npm_config_cache: ${{ runner.temp }}\conductor-build-temp\npm-cache
          CSC_LINK: ''
          WIN_CSC_LINK: ''
          SKIP_NOTARIZATION: 'true'
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: 'true'
          DISABLE_CODE_SIGNING: 'true'
          NO_CODE_SIGNING: 'true'

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-distributions
          path: distribution/builds/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit build metadata
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/pull')
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-increment build ID [skip ci]'
          file_pattern: '.build-metadata.json'
          skip_dirty_check: true

      - name: Create Release with All Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: distribution/builds/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $buildSummary = Get-Content -Path "distribution/builds/BUILD-*-SUMMARY.md" -Raw
          Write-Output "## Build Summary" | Out-File -FilePath release_notes.txt
          Write-Output "" | Out-File -FilePath release_notes.txt -Append
          Write-Output $buildSummary | Out-File -FilePath release_notes.txt -Append

      - name: Upload Release Artifact Summary
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: distribution-summary
          path: distribution/README.md
          if-no-files-found: warn
          retention-days: 7
