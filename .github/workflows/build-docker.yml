name: Build Docker & Windows

on:
  push:
    branches:
      - main
      - master
      - copilot/**
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build web application
        run: npm run build

      - name: Build Windows executable
        run: npm run sea:build:windows
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Find and prepare artifacts
        id: artifacts
        shell: powershell
        run: |
          # Find the latest sea-build directory
          $seaBuildDirs = Get-ChildItem -Path "dist" -Directory -Filter "sea-build-*" | Sort-Object Name -Descending
          if ($seaBuildDirs.Count -eq 0) {
            Write-Host "❌ No sea-build directory found!"
            exit 1
          }
          
          $latestDir = $seaBuildDirs[0].FullName
          Write-Host "✓ Found build directory: $latestDir"
          
          # Find EXE and ZIP files
          $exeFile = Get-ChildItem -Path $latestDir -Filter "*.exe" | Select-Object -First 1
          $zipFile = Get-ChildItem -Path $latestDir -Filter "*.zip" | Select-Object -First 1
          
          if ($exeFile) {
            Write-Host "✓ Found EXE: $($exeFile.Name)"
            echo "exe_path=$($exeFile.FullName)" >> $env:GITHUB_OUTPUT
          }
          
          if ($zipFile) {
            Write-Host "✓ Found ZIP: $($zipFile.Name)"
            echo "zip_path=$($zipFile.FullName)" >> $env:GITHUB_OUTPUT
          }
          
          echo "build_dir=$latestDir" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            ${{ steps.artifacts.outputs.exe_path }}
            ${{ steps.artifacts.outputs.zip_path }}
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release (on main/master push)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.artifacts.outputs.exe_path }}
            ${{ steps.artifacts.outputs.zip_path }}
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  export-tar:
    name: Export Docker Image as TAR
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    strategy:
      matrix:
        platform:
          - { name: 'amd64', value: 'linux/amd64' }
          - { name: 'arm64', value: 'linux/arm64' }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for ${{ matrix.platform.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          outputs: type=docker,dest=/tmp/image-${{ matrix.platform.name }}.tar
          platforms: ${{ matrix.platform.value }}

      - name: Create version tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload TAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.platform.name }}-${{ steps.version.outputs.version }}
          path: /tmp/image-${{ matrix.platform.name }}.tar
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release with Docker TAR (on tag)
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          files: /tmp/image-${{ matrix.platform.name }}.tar
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
